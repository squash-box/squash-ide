name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: go vet ./...
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go test -race -coverprofile
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: coverage summary
        run: go tool cover -func=coverage.out | tail -n 20
      - name: coverage gate
        # Floor starts at 50% — rises in follow-up tasks as packages backfill.
        # See T-018 acceptance criteria: "Coverage baseline lifted".
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {sub(/%/,"",$3); print $3}')
          echo "total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { if (t+0 < 50.0) { exit 1 } }'
      - name: upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: e2e tests
        run: go test -tags=e2e -race -timeout=180s ./e2e/...
